<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antojitos</title>
   <link rel="icon" href="https://i.postimg.cc/y8WqzSmg/logo.jpg" type="image/jpeg">

    <link rel="apple-touch-icon" href="https://i.postimg.cc/y8WqzSmg/logo.jpg">

    <link rel="shortcut icon" sizes="192x192" href="https://i.postimg.cc/y8WqzSmg/logo.jpg">
    <link rel="shortcut icon" sizes="512x512" href="https://i.postimg.cc/y8WqzSmg/logo.jpg">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Antojitos">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="google-site-verification" content="VSZPXOEtAUgP3MLla9kXNxPd7Ga2EcecufhXqHel_ls" />
    <meta name="description" content="Sistema de pedidos de Antojitos - Comida rápida.">
    <meta name="keywords" content="Antojitos, pedidos, comida rapida, UPTAIT, Carlos, hamburguesas, pollo broaster">
    <meta name="author" content="JACKSON GAMEZ">
   
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --oro: #d4af37; --negro: #000; --gris: #121212; --verde: #2ecc71; --rojo: #e74c3c; }
        body { background: var(--negro); color: var(--oro); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .seccion { display: none; padding: 20px; }
        .activa { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .container { max-width: 500px; margin: auto; background: #050505; min-height: 100vh; border: 1px solid #222; position: relative; }
        input, button, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--oro); font-weight: bold; box-sizing: border-box; }
        textarea { background: #111; color: white; height: 65px; resize: none; border: 1px solid #333; }
        button { background: var(--oro); color: #000; cursor: pointer; border: none; }
        .cat-titulo { background: var(--oro); color: #000; padding: 12px; border-radius: 6px; margin: 25px 0 15px; text-align: center; font-weight: 900; letter-spacing: 1px; }
        .producto-card { background: var(--gris); padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        .footer-carrito { position: sticky; bottom: 0; background: #000; padding: 20px; border-top: 3px solid var(--oro); text-align: center; z-index: 100; }
        .status-box { background: #111; border: 2px solid var(--oro); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .ticket-carlos { background: white; color: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 10px solid var(--verde); }
    </style>
</head>
<body>

<div class="container">

  <div id="p-inicio" class="seccion activa">
    <div style="text-align:center; margin-top:50px;">
        <img src="https://i.postimg.cc/y8WqzSmg/logo.jpg" alt="Logo Antojitos" style="width:150px; height:150px; border-radius:50%; border:3px solid var(--oro); object-fit: cover;">
        <h1 style="letter-spacing:4px; margin-top:20px">ANTOJITOS</h1>
    </div>
    <button onclick="irSeccion('p-login')">INGRESAR COMO CLIENTE</button>
    <button style="background:none; color:white; border:1px solid #333; margin-top:40px" onclick="entrarCarlos()">ADMINISTRACIÓN (CARLOS)</button>
</div>

    <div id="p-menu" class="seccion">
        <h2 id="saludo-h" style="color:white; text-align:center"></h2>
        <div id="lista-menu"></div>
        
        <div id="area-seguimiento" style="display:none;" class="status-box">
            <p id="texto-seguimiento" style="color:white; font-weight:bold">PEDIDO RECIBIDO...</p>
            <button id="btn-cancelar-60" style="background:var(--rojo); color:white" onclick="cancelarPorCliente()">CANCELAR PEDIDO (60s)</button>
        </div>

        <div class="footer-carrito" id="barra-pedido">
            <span style="color:#aaa">Total: <b style="color:var(--verde)">$<span id="monto-total">0</span></b></span>
            <button onclick="enviarPedido()" style="background:var(--verde); color:white; margin-top:10px">ENVIAR PEDIDO</button>
        </div>
    </div>

    <div id="p-carlos" class="seccion">
        <div style="background:#111; padding:20px; border-radius:15px; text-align:center; margin-bottom:20px; border:1px solid var(--verde)">
            <h3 style="margin:0; color:#888">VENTAS DE HOY</h3>
            <h1 id="ventas-acumuladas" style="color:var(--verde); margin:10px 0">$0</h1>
        </div>

        <button onclick="toggleBox('div-admin')">⚙️ GESTIONAR MENÚ / PROMOS</button>
        <div id="div-admin" style="display:none; background:#1a1a1a; padding:15px; border-radius:10px">
            <button onclick="nuevaPromo()" style="background:var(--verde); color:white">+ CREAR PROMOCIÓN</button>
            <div id="editor-lista"></div>
        </div>

        <button id="btn-voz-carlos" onclick="activarVozSistema()" style="background:#333; color:white; margin-top:10px">🔊 ACTIVAR AVISOS POR VOZ</button>
        
        <h2 style="color:var(--verde); text-align:center; margin-top:30px">PEDIDOS EN COCINA</h2>
        <div id="pedidos-carlos"></div>
        <button onclick="location.reload()" style="background:#222; color:white; margin-top:40px">CERRAR SESIÓN</button>
    </div>
</div>

<script>
     const firebaseConfig = {
  apiKey: "AIzaSyDpndWo-syEwXo__nBs-aD6rtDSTY36YCY",
  authDomain: "antojitosweb.firebaseapp.com",
  databaseURL: "https://antojitosweb-default-rtdb.firebaseio.com",
  projectId: "antojitosweb",
  storageBucket: "antojitosweb.firebasestorage.app",
  messagingSenderId: "1018883428835",
  appId: "1:1018883428835:web:bdb0f3b658ba3121a010d6",
  measurementId: "G-HSV7MGM4FM"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
    
let catalogo = [
    {cat:'POLLO A LA BROASTER', nom:'1 pieza de pollo', pre:8000, desc:'ensalada, papa a la francesa'},
    {cat:'POLLO A LA BROASTER', nom:'2 piezas de pollo', pre:12000, desc:'ensalada, papa a la francesa'},
    {cat:'POLLO A LA BROASTER', nom:'3 piezas de pollo', pre:16000, desc:'ensalada, papa a la francesa'},
    {cat:'POLLO A LA BROASTER', nom:'4 piezas de pollo', pre:21000, desc:'ensalada, papa a la francesa'},
    {cat:'POLLO A LA BROASTER', nom:'8 piezas de pollo', pre:40000, desc:'ensalada, papa a la francesa'},
    {cat:'SALCHIPAPA', nom:'Salchipapa "Ta bien"', pre:8000, desc:'papa francesa, salchicha, vegetales, queso'},
    {cat:'SALCHIPAPA', nom:'Salchipapa "Gustico"', pre:13000, desc:'papa francesa, salchicha, vegetales, queso, tocineta, porcion mixta de carne y pollo'},
    {cat:'SALCHIPAPA', nom:'Salchipapa "Súper antojitos"', pre:19000, desc:'papa francesa, salchicha, vegetales, queso, dos porciones de proteina, tocineta'},
    {cat:'HAMBURGUESAS', nom:'Hamburguesa Mini (Carne)', pre:6000, desc:'pan, croqueta de carne, vegetales, papita, queso, salsa'},
    {cat:'HAMBURGUESAS', nom:'Hamburguesa Mini (Pollo)', pre:7000, desc:'pan, pollo, vegetales, papita, queso, salsa'},
    {cat:'HAMBURGUESAS', nom:'Hamburguesa Mini (Mechada)', pre:8000, desc:'pan, carne mechada, vegetales, papita, queso, salsa'},
    {cat:'HAMBURGUESAS', nom:'Hamburguesa "Antojitos"', pre:9000, desc:'pan, carne mechada, vegetales, papita, salsa, huevo, tocineta, jamon'},
    {cat:'HAMBURGUESAS', nom:'Hamburguesa "Momo"', pre:13000, desc:'pan, dos porciones de carne o pollo, queso tajado, huevo, aguacate, vegetales, papita, tocineta, jamon'},
    {cat:'HAMBURGUESAS', nom:'Hamburguesa "Trifásica"', pre:19000, desc:'pan, pollo, chuleta, carne, queso tajado, huevo, aguacate, vegetales, papita, tocineta, jamon, salsas'},
    {cat:'PERROS', nom:'Perro hambruno', pre:5000, desc:'pan, salchicha, papitas, queso, salsas, vegetales'},
    {cat:'PERROS', nom:'Perro especial', pre:9000, desc:'pan, salchicha, papitas, queso, salsas, carne desmechada o pollo desmechado, vegetales, jamón'},
    {cat:'PERROS', nom:'Perro americano', pre:13000, desc:'pan, salchicha, papitas, salsas, dos proteinas, tocino, jamon, vegetales'}
];

let carrito = [], audioActivado = false, miPedidoID = null, timerCancel = null, conteoPedidosPrevio = -1;

db.ref('config/menu').on('value', (snap) => {
    if(snap.exists()) {
        catalogo = snap.val();
        if(document.getElementById('p-menu').classList.contains('activa')) {
            renderizarMenu();
        }
    } else {
       
        db.ref('config/menu').set(catalogo);
    }
});

function hablar(msj) {
    if(audioActivado) {
        const u = new SpeechSynthesisUtterance(msj);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
    }
}

function irSeccion(id) {
    document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
    document.getElementById(id).classList.add('activa');
}

function iniciarCliente() {
    if(!document.getElementById('nombre-usuario').value) return alert("Ingresa tu nombre");
    audioActivado = true;
    document.getElementById('saludo-h').innerText = "BIENVENIDO, " + document.getElementById('nombre-usuario').value.toUpperCase();
    irSeccion('p-menu');
    renderizarMenu();
}
function renderizarMenu() {
    let html = "", catActual = "";
    
    catalogo.forEach((p, i) => {
       
        if (p.visible === false) return; 

        
        if (p.cat !== catActual) { 
            catActual = p.cat; 
            html += `<div class="cat-titulo">${catActual}</div>`; 
        }

        
        html += `
            <div class="producto-card">
        <div class="info">
            <div class="nombre"><b>${p.nom}</b></div>
            <div class="descripcion">${p.desc || ''}</div>
        </div>
        <div style="margin-top:10px">
            <textarea id="nota-${i}" placeholder="¿Cómo lo quieres? (Sin cebolla, salsas, etc.)"></textarea>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="color:var(--verde)">$${p.pre}</span>
            <button onclick="agregarAlCarrito(${i})" style="width:100px; padding:10px">+ LISTO</button>
        </div>
    </div>`;
    });
   document.getElementById('lista-menu').innerHTML = html;
}
function agregarAlCarrito(i) {
    const p = catalogo[i];
    const nota = document.getElementById(`nota-${i}`).value; // Esta línea lee los ingredientes
    carrito.push({ nombre: p.nom, precio: Number(p.pre), nota: nota }); // Aquí los guarda[cite: 1]
    
    
    let total = carrito.reduce((a, b) => a + b.precio, 0);
    document.getElementById('monto-total').innerText = total.toLocaleString();
    
  
    document.getElementById(`nota-${i}`).value = "";
    alert("Agregado: " + p.nom);
}
function enviarPedido() {
    if(!carrito.length) return;
    const nuevo = db.ref('pedidos').push({
        cliente: document.getElementById('nombre-usuario').value,
        items: carrito, total: carrito.reduce((a, b) => a + b.precio, 0),
        estado: 'pendiente', hora: Date.now(), fecha: new Date().toLocaleDateString()
    });
    miPedidoID = nuevo.key;
    
    document.getElementById('barra-pedido').style.display = 'none';
    document.getElementById('lista-menu').style.display = 'none';
    document.getElementById('area-seguimiento').style.display = 'block';

    let seg = 60;
    const btnC = document.getElementById('btn-cancelar-60');
    timerCancel = setInterval(() => {
        seg--;
        btnC.innerText = `CANCELAR PEDIDO (${seg}s)`;
        if(seg <= 0) { clearInterval(timerCancel); btnC.style.display = 'none'; }
    }, 1000);

    db.ref('pedidos/' + miPedidoID).on('value', snap => {
        const p = snap.val();
        if(p?.estado === 'listo') {
            hablar("Tu pedido en Antojitos ya está listo, puedes retirarlo.");
            document.getElementById('texto-seguimiento').innerHTML = "<h2 style='color:var(--verde)'>¡PEDIDO LISTO! ✅</h2>";
            btnC.style.display = 'none';
        }
    });
}

function cancelarPorCliente() {
    if(confirm("¿Seguro que deseas cancelar?")) {
        db.ref('pedidos/' + miPedidoID).update({ estado: 'cancelado_cliente' });
        location.reload();
    }
}

function entrarCarlos() {
    if(prompt("Código Admin:") === "antojitos2026") {
        irSeccion('p-carlos');
        db.ref('pedidos').on('value', snap => {
            const cont = document.getElementById('pedidos-carlos');
            let ventasTotal = 0, hoy = new Date().toLocaleDateString(), cuentaPendientes = 0;
            cont.innerHTML = "";
            
            snap.forEach(h => {
                const p = h.val();
                if(p.fecha === hoy && p.estado === 'listo') ventasTotal += p.total;
                if(p.estado === 'pendiente') {
                    cuentaPendientes++;
                    cont.innerHTML += `<div class="ticket-carlos">
                        <b>CLIENTE: ${p.cliente.toUpperCase()}</b><hr>
                        ${p.items.map(it => `• ${it.nombre} <br><small style="color:blue">Nota: ${it.nota || 'Sin nota'}</small>`).join('<br>')}
                        <button onclick="marcarListo('${h.key}')" style="background:var(--verde); color:white; margin-top:10px">PEDIDO LISTO ✅</button>
                    </div>`;
                }
                if(p.estado === 'cancelado_cliente') {
                    hablar("Carlos, un pedido ha sido cancelado.");
                    db.ref('pedidos/'+h.key).remove();
                }
            });

            if(conteoPedidosPrevio !== -1 && cuentaPendientes > conteoPedidosPrevio) {
                hablar("Carlos, tienes un nuevo pedido.");
            }
            conteoPedidosPrevio = cuentaPendientes;
            document.getElementById('ventas-acumuladas').innerText = "$" + ventasTotal.toLocaleString();
        });
    }
}

function marcarListo(id) {
    db.ref('pedidos/' + id).update({ estado: 'listo' });
    hablar("Pedido marcado como listo.");
}

function activarVozSistema() { 
    audioActivado = true; 
    hablar("Sistema de voz activado para Carlos.");
    document.getElementById('btn-voz-carlos').style.background = "#2ecc71";
}

function toggleBox(id) { 
    const d = document.getElementById(id); 
    d.style.display = d.style.display === 'none' ? 'block' : 'none'; 
    if(d.style.display === 'block') renderEditor();
}

function renderEditor() {
    let h = "";
    catalogo.forEach((p, i) => {
       
        const colorBtn = p.visible !== false ? 'var(--verde)' : '#555';
        const textoBtn = p.visible !== false ? 'PÚBLICO' : 'OCULTO';

        h += `<div style="border-bottom:1px solid #333; padding:10px; position:relative">
            <button onclick="toggleVisible(${i})" style="width:80px; font-size:10px; background:${colorBtn}; position:absolute; right:10px; top:10px">${textoBtn}</button>
            <input type="text" value="${p.nom}" onchange="catalogo[${i}].nom=this.value; updateDB()">
            <textarea placeholder="Descripción" onchange="catalogo[${i}].desc=this.value; updateDB()">${p.desc || ''}</textarea>
            <input type="number" value="${p.pre}" onchange="catalogo[${i}].pre=Number(this.value); updateDB()">
        </div>`;
    });
    document.getElementById('editor-lista').innerHTML = h;
}


function toggleVisible(i) {
    catalogo[i].visible = catalogo[i].visible === false ? true : false;
    updateDB();
    renderEditor();
}
function nuevaPromo() {
    catalogo.unshift({cat:'PROMOCIONES', nom:'Nueva Promo', pre:0, desc:'Editar descripción'});
    renderEditor();
    updateDB();
}

function updateDB() { db.ref('config/menu').set(catalogo); }
</script>
</body>
</html>
